# ── Window rules ─────────────────────────────────────────────────

xwayland {
    force_zero_scaling = true
}

windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
    workspace = special:hidden silent
}

windowrule = rounding 8, match:tag pop

windowrule = suppress_event maximize, match:class .*
windowrule = idle_inhibit always, match:fullscreen 1
windowrule = idle_inhibit fullscreen, match:class (steam.*|com.libretro.RetroArch)

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Password managers: hide from screen share
windowrule = no_screen_share on, match:class ^(1[pP]assword|Bitwarden)$

windowrule = float on, match:class com.gabm.satty
windowrule = float on, match:class nwg-displays
windowrule = size 1200 800, match:class nwg-displays
windowrule = center on, match:class nwg-displays

windowrule  {
    name = floating-tui
    match:class = floating-tui
    float = on
    center = on
    size = 875 600
}

windowrule  {
    name = floating-tui-large
    match:class = floating-tui-large
    float = on
    center = on
    size = 1200 700
}

# ── PiP ─────────────────────────────────────────────────────────

windowrule {
    name = pip
    match:title = ^Picture.in.[Pp]icture$
    float = on
    pin = on
    size = 480 270
    move = 100%-490 100%-280
    keep_aspect_ratio = on
    border_size = 0
}

# ── Webcam overlay ──────────────────────────────────────────────

windowrule = float on, match:title WebcamOverlay
windowrule = pin on, match:title WebcamOverlay
windowrule = no_initial_focus on, match:title WebcamOverlay
windowrule = no_dim on, match:title WebcamOverlay
windowrule = move (monitor_w-window_w-40) (monitor_h-window_h-40), match:title WebcamOverlay

# ── Steam ────────────────────────────────────────────────────────

windowrule = float on, match:class ^steam$, match:title ^(?!Steam$)
windowrule = center on, match:class ^steam$, match:title ^(?!Steam$)

# ── File dialogs ─────────────────────────────────────────────────

windowrule = float on, match:title ^(Open|Save|File|Folder|Browse)
windowrule = center on, match:title ^(Open|Save|File|Folder|Browse)
windowrule = size 900 600, match:title ^(Open|Save|File|Folder|Browse)

# ── Layer rules ──────────────────────────────────────────────────

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi

layerrule = no_anim on, match:namespace walker
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.3, match:namespace walker

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.3, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window

layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0.3, match:namespace logout_dialog

layerrule = no_anim on, match:namespace selection
