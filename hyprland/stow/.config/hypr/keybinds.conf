# ── Basics ───────────────────────────────────────────────────────

bindd = $mainMod, return, Terminal, exec, uwsm-app -- $terminal
bindd = $mainMod, BackSpace, Close window, killactive,
bindd = $mainMod SHIFT, BackSpace, Close all windows, exec, ~/.config/hypr/scripts/close-all.sh
bindd = $mainMod, C, Close window, killactive,
bindd = $mainMod, space, Launch apps, exec, ~/.local/bin/launch-walker
bindd = $mainMod SHIFT, C, Reload Hyprland + Waybar, exec, sh -c 'hyprctl reload; killall waybar; uwsm-app -- waybar &'
bindd = CTRL ALT, Delete, System menu, exec, ~/.local/bin/menu --go system
bindd = $mainMod, Escape, Lock screen, exec, hyprlock
bindd = $mainMod, K, Show keybindings, exec, ~/.local/bin/show-keybinds
bindd = $mainMod, M, Menu, exec, ~/.local/bin/menu

# Alt-Tab window switcher
bindd = ALT, Tab, Next window, exec, snappy-switcher next
bindd = ALT SHIFT, Tab, Previous window, exec, snappy-switcher prev
bindd = $mainMod SHIFT, D, Display settings, exec, uwsm-app -- nwg-displays
bindd = $mainMod CTRL, S, Cycle display scaling, exec, ~/.config/hypr/scripts/cycle-scale.sh

# Toggle floating btop system monitor
bindd = $mainMod, I, System monitor, exec, ~/.config/hypr/scripts/toggle-launch.sh btop --class floating-tui-large

# Toggle animations
bindd = $mainMod SHIFT, A, Toggle animations, exec, ~/.config/hypr/scripts/toggle-animations.sh
bindd = $mainMod CTRL, G, Toggle gaps, exec, ~/.config/hypr/scripts/toggle-gaps.sh

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Focus ────────────────────────────────────────────────────────

# Vim keys
bindd = $mainMod, h, Focus left, movefocus, l
bindd = $mainMod, j, Focus down, movefocus, d
bindd = $mainMod, k, Focus up, movefocus, u
bindd = $mainMod, l, Focus right, movefocus, r
# Arrow keys
bindd = $mainMod, Left, Focus left, movefocus, l
bindd = $mainMod, Down, Focus down, movefocus, d
bindd = $mainMod, Up, Focus up, movefocus, u
bindd = $mainMod, Right, Focus right, movefocus, r

# Move the focused window (vim keys)
bindd = $mainMod SHIFT, h, Move window left, movewindow, l
bindd = $mainMod SHIFT, j, Move window down, movewindow, d
bindd = $mainMod SHIFT, k, Move window up, movewindow, u
bindd = $mainMod SHIFT, l, Move window right, movewindow, r
# Move the focused window (arrow keys)
bindd = $mainMod SHIFT, Left, Move window left, movewindow, l
bindd = $mainMod SHIFT, Down, Move window down, movewindow, d
bindd = $mainMod SHIFT, Up, Move window up, movewindow, u
bindd = $mainMod SHIFT, Right, Move window right, movewindow, r

# Toggle focus between tiling and floating
bindd = $mainMod, semicolon, Raise window, alterzorder, top

# ── Workspaces ───────────────────────────────────────────────────

# Switch to workspace
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10

# Move window to workspace and follow
bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Move window to workspace without following
bindd = $mainMod CTRL, 1, Send window to workspace 1, movetoworkspacesilent, 1
bindd = $mainMod CTRL, 2, Send window to workspace 2, movetoworkspacesilent, 2
bindd = $mainMod CTRL, 3, Send window to workspace 3, movetoworkspacesilent, 3
bindd = $mainMod CTRL, 4, Send window to workspace 4, movetoworkspacesilent, 4
bindd = $mainMod CTRL, 5, Send window to workspace 5, movetoworkspacesilent, 5
bindd = $mainMod CTRL, 6, Send window to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod CTRL, 7, Send window to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod CTRL, 8, Send window to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod CTRL, 9, Send window to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod CTRL, 0, Send window to workspace 10, movetoworkspacesilent, 10

# Toggle back to previous workspace
bindd = $mainMod, grave, Previous workspace, workspace, previous

# Cycle workspaces
bindd = $mainMod, bracketleft, Previous workspace, workspace, m-1
bindd = $mainMod, bracketright, Next workspace, workspace, m+1
bindd = $mainMod SHIFT, bracketleft, Move window to previous workspace, movetoworkspace, m-1
bindd = $mainMod SHIFT, bracketright, Move window to next workspace, movetoworkspace, m+1

# Scroll through workspaces
bindd = $mainMod, mouse_down, Scroll workspace forward, workspace, e+1
bindd = $mainMod, mouse_up, Scroll workspace back, workspace, e-1

# ── Multi-monitor ────────────────────────────────────────────────

bindd = $mainMod, comma, Focus previous monitor, focusmonitor, -1
bindd = $mainMod, period, Focus next monitor, focusmonitor, +1
bindd = $mainMod SHIFT, comma, Move window to previous monitor, movewindow, mon:-1
bindd = $mainMod SHIFT, period, Move window to next monitor, movewindow, mon:+1
bindd = $mainMod CTRL, comma, Move workspace to previous monitor, movecurrentworkspacetomonitor, -1
bindd = $mainMod CTRL, period, Move workspace to next monitor, movecurrentworkspacetomonitor, +1

# ── Clamshell mode ──────────────────────────────────────────────

# Lid close: clamshell mode only (lock+suspend handled by logind+hypridle)
bindl = , switch:on:Lid Switch, exec, [ $(hyprctl monitors -j | grep -c '"name"') -gt 1 ] && hyprctl keyword monitor "eDP-1, disable"
# Lid open: re-enable laptop screen only if it was disabled (clamshell mode)
bindl = , switch:off:Lid Switch, exec, hyprctl monitors -j | grep -q '"name": "eDP-1"' || hyprctl keyword monitor "eDP-1, preferred, auto, 1.6"

# ── Layout ───────────────────────────────────────────────────────

bindd = $mainMod, F, Fullscreen, fullscreen, 0
bindd = $mainMod SHIFT, F, Fullscreen (keep bar), fullscreen, 1
bindd = $mainMod SHIFT, space, Toggle floating, togglefloating,
bindd = $mainMod, T, Pop window, exec, ~/.config/hypr/scripts/window-pop.sh
bindd = $mainMod, M, Swap with master, layoutmsg, swapwithmaster
bindd = $mainMod, O, Cycle orientation, layoutmsg, orientationcycle left top
bindd = $mainMod SHIFT, P, Toggle pseudo-tile, pseudo,
bindd = $mainMod SHIFT, M, Toggle master/scrolling layout, exec, ~/.config/hypr/scripts/toggle-layout.sh

# ── Groups ───────────────────────────────────────────────────────

bindd = $mainMod, G, Toggle group, togglegroup,
bindd = $mainMod, Tab, Next group window, changegroupactive, f
bindd = $mainMod SHIFT, Tab, Previous group window, changegroupactive, b
bindd = $mainMod CTRL, h, Move window/group left, movewindoworgroup, l
bindd = $mainMod CTRL, j, Move window/group down, movewindoworgroup, d
bindd = $mainMod CTRL, k, Move window/group up, movewindoworgroup, u
bindd = $mainMod CTRL, l, Move window/group right, movewindoworgroup, r

# ── Resize submap ────────────────────────────────────────────────

bindd = $mainMod, R, Enter resize mode, submap, resize

submap = resize
binde = , h, resizeactive, -10 0
binde = , j, resizeactive, 0 10
binde = , k, resizeactive, 0 -10
binde = , l, resizeactive, 10 0
binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0
binde = SHIFT, h, resizeactive, -50 0
binde = SHIFT, j, resizeactive, 0 50
binde = SHIFT, k, resizeactive, 0 -50
binde = SHIFT, l, resizeactive, 50 0
binde = CTRL, h, moveactive, -20 0
binde = CTRL, j, moveactive, 0 20
binde = CTRL, k, moveactive, 0 -20
binde = CTRL, l, moveactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Media / Volume / Brightness ──────────────────────────────────

$osd = swayosd-client --monitor $(hyprctl monitors -j | jq -r '.[]|select(.focused==true).name')

bindld = $mainMod, XF86AudioMute, Switch audio output, exec, ~/.local/bin/audio-switch
bindld = , XF86AudioMute, Toggle mute, exec, $osd --output-volume mute-toggle
bindld = , XF86AudioLowerVolume, Volume down, exec, $osd --output-volume lower
bindld = , XF86AudioRaiseVolume, Volume up, exec, $osd --output-volume raise
bindld = , XF86AudioMicMute, Toggle mic mute, exec, $osd --input-volume mute-toggle

bindld = , XF86MonBrightnessDown, Brightness down, exec, $osd --brightness lower
bindld = , XF86MonBrightnessUp, Brightness up, exec, $osd --brightness raise

bindld = , XF86AudioPlay, Play/pause, exec, playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, playerctl pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous
bindld = , XF86AudioStop, Stop playback, exec, playerctl stop

# ── Screenshots ───────────────────────────────────────────────────

bindd = , Print, Screenshot, exec, ~/.local/bin/screenshot
bindd = $mainMod SHIFT, R, Screen record, exec, ~/.config/hypr/scripts/screenrecord.sh

# ── Utilities ────────────────────────────────────────────────────

bindd = $mainMod SHIFT, V, Clipboard history, exec, ~/.local/bin/launch-walker -m clipboard

bindd = $mainMod, N, Notification center, exec, swaync-client -t
bindd = $mainMod SHIFT, N, Clear notifications, exec, swaync-client -C
bindd = $mainMod CTRL, N, Close latest notification, exec, swaync-client --close-latest
bindd = $mainMod CTRL, T, Toggle nightlight, exec, ~/.local/bin/toggle-nightlight
bindd = $mainMod CTRL, P, Power profile, exec, ~/.local/bin/power-profile-cycle

# Zoom
bindd = $mainMod CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = $mainMod CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

bindd = $mainMod, W, Wifi controls, exec, ~/.config/hypr/scripts/toggle-launch.sh wlctl
bindd = $mainMod, V, Audio controls, exec, ~/.config/hypr/scripts/toggle-launch.sh wiremix
bindd = $mainMod, B, Bluetooth controls, exec, ~/.config/hypr/scripts/toggle-launch.sh bluetui
bindd = $mainMod, E, File manager, exec, uwsm-app -- kitty -e yazi

# Theme picker / background cycle
bindd = $mainMod SHIFT, T, Theme picker, exec, ~/.local/bin/theme-set --picker
bindd = $mainMod SHIFT, B, Next background, exec, ~/.local/bin/theme-set --bg-next

# Emoji picker
bindd = $mainMod CTRL, E, Emoji picker, exec, ~/.local/bin/launch-walker -m symbols

# Zen browser
bindd = $mainMod, Z, Zen browser, exec, ~/.local/bin/launch-or-focus zen "uwsm-app -- zen-browser"
bindd = $mainMod SHIFT, G, Signal, exec, ~/.local/bin/launch-or-focus signal "uwsm-app -- signal-desktop"

# Toggle xwayland video bridge (for screen sharing in X11 apps)
bindd = $mainMod SHIFT, X, Toggle XWayland video bridge, exec, sh -c 'if pidof xwaylandvideobridge >/dev/null; then killall xwaylandvideobridge && notify-send "xwaylandvideobridge stopped"; else xwaylandvideobridge & notify-send "xwaylandvideobridge started"; fi'

# Bitwarden vault picker
bindd = $mainMod, P, Bitwarden vault, exec, ~/.local/bin/launch-walker -m bitwarden --theme bitwarden --width 800
