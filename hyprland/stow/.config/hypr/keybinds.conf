# ── Basics ───────────────────────────────────────────────────────

bind = $mainMod, return, exec, uwsm-app -- $terminal
bind = $mainMod, BackSpace, killactive,
bind = $mainMod SHIFT, BackSpace, exec, ~/.config/hypr/scripts/close-all.sh
bind = $mainMod, C, killactive,
bind = $mainMod, space, exec, ~/.local/bin/launch-walker
bind = $mainMod SHIFT, C, exec, sh -c 'hyprctl reload; killall waybar; uwsm-app -- waybar &'
bind = CTRL ALT, Delete, exec, ~/.local/bin/menu --go system
bind = $mainMod, Escape, exec, hyprlock
bind = $mainMod, K, exec, ~/.local/bin/show-keybinds
bind = $mainMod, M, exec, ~/.local/bin/menu

# Alt-Tab window switcher
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev
bind = $mainMod SHIFT, D, exec, uwsm-app -- wdisplays
bind = $mainMod CTRL, S, exec, ~/.config/hypr/scripts/cycle-scale.sh

# Toggle floating btop system monitor
bind = $mainMod, I, exec, ~/.config/hypr/scripts/toggle-launch.sh btop --class floating-tui-large

# Toggle animations
bind = $mainMod SHIFT, A, exec, ~/.config/hypr/scripts/toggle-animations.sh
bind = $mainMod CTRL, G, exec, ~/.config/hypr/scripts/toggle-gaps.sh

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Focus ────────────────────────────────────────────────────────

# Vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r
# Arrow keys
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

# Move the focused window (vim keys)
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r
# Move the focused window (arrow keys)
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Down, movewindow, d
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

# Toggle focus between tiling and floating
bind = $mainMod, semicolon, alterzorder, top

# ── Workspaces ───────────────────────────────────────────────────

# Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace and follow
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace without following
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Toggle back to previous workspace
bind = $mainMod, grave, workspace, previous

# Cycle workspaces
bind = $mainMod, bracketleft, workspace, m-1
bind = $mainMod, bracketright, workspace, m+1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, m-1
bind = $mainMod SHIFT, bracketright, movetoworkspace, m+1

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Multi-monitor ────────────────────────────────────────────────

bind = $mainMod, comma, focusmonitor, -1
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod SHIFT, comma, movewindow, mon:-1
bind = $mainMod SHIFT, period, movewindow, mon:+1
bind = $mainMod CTRL, comma, movecurrentworkspacetomonitor, -1
bind = $mainMod CTRL, period, movecurrentworkspacetomonitor, +1

# ── Clamshell mode ──────────────────────────────────────────────

# Lid close: clamshell mode only (lock+suspend handled by logind+hypridle)
bindl = , switch:on:Lid Switch, exec, [ $(hyprctl monitors -j | grep -c '"name"') -gt 1 ] && hyprctl keyword monitor "eDP-1, disable"
# Lid open: re-enable laptop screen only if it was disabled (clamshell mode)
bindl = , switch:off:Lid Switch, exec, hyprctl monitors -j | grep -q '"name": "eDP-1"' || hyprctl keyword monitor "eDP-1, preferred, auto, 1.6"

# ── Layout ───────────────────────────────────────────────────────

bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod SHIFT, space, togglefloating,
bind = $mainMod, T, exec, ~/.config/hypr/scripts/window-pop.sh
bind = $mainMod, M, layoutmsg, swapwithmaster
bind = $mainMod, O, layoutmsg, orientationcycle left top
bind = $mainMod SHIFT, P, pseudo,
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/toggle-layout.sh

# ── Groups ───────────────────────────────────────────────────────

bind = $mainMod, G, togglegroup,
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, Tab, changegroupactive, b
bind = $mainMod CTRL, h, movewindoworgroup, l
bind = $mainMod CTRL, j, movewindoworgroup, d
bind = $mainMod CTRL, k, movewindoworgroup, u
bind = $mainMod CTRL, l, movewindoworgroup, r

# ── Resize submap ────────────────────────────────────────────────

bind = $mainMod, R, submap, resize

submap = resize
binde = , h, resizeactive, -10 0
binde = , j, resizeactive, 0 10
binde = , k, resizeactive, 0 -10
binde = , l, resizeactive, 10 0
binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0
binde = SHIFT, h, resizeactive, -50 0
binde = SHIFT, j, resizeactive, 0 50
binde = SHIFT, k, resizeactive, 0 -50
binde = SHIFT, l, resizeactive, 50 0
binde = CTRL, h, moveactive, -20 0
binde = CTRL, j, moveactive, 0 20
binde = CTRL, k, moveactive, 0 -20
binde = CTRL, l, moveactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Media / Volume / Brightness ──────────────────────────────────

$osd = swayosd-client --monitor $(hyprctl monitors -j | jq -r '.[]|select(.focused==true).name')

bindl = $mainMod, XF86AudioMute, exec, ~/.local/bin/audio-switch
bindl = , XF86AudioMute, exec, $osd --output-volume mute-toggle
bindl = , XF86AudioLowerVolume, exec, $osd --output-volume lower
bindl = , XF86AudioRaiseVolume, exec, $osd --output-volume raise
bindl = , XF86AudioMicMute, exec, $osd --input-volume mute-toggle

bindl = , XF86MonBrightnessDown, exec, $osd --brightness lower
bindl = , XF86MonBrightnessUp, exec, $osd --brightness raise

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# ── Screenshots ───────────────────────────────────────────────────

bind = , Print, exec, ~/.local/bin/screenshot
bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/screenrecord.sh

# ── Utilities ────────────────────────────────────────────────────

# Clipboard history
bind = $mainMod SHIFT, V, exec, ~/.local/bin/launch-walker -m clipboard

# Notification center
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, swaync-client -C
bind = $mainMod CTRL, N, exec, swaync-client --close-latest
bind = $mainMod CTRL, T, exec, ~/.local/bin/toggle-nightlight
bind = $mainMod CTRL, P, exec, ~/.local/bin/power-profile-cycle

bind = $mainMod, W, exec, ~/.config/hypr/scripts/toggle-launch.sh wlctl
bind = $mainMod, V, exec, ~/.config/hypr/scripts/toggle-launch.sh wiremix
bind = $mainMod, B, exec, ~/.config/hypr/scripts/toggle-launch.sh bluetui
bind = $mainMod, E, exec, uwsm-app -- kitty -e yazi

# Theme picker / background cycle
bind = $mainMod SHIFT, T, exec, ~/.local/bin/theme-set --picker
bind = $mainMod SHIFT, B, exec, ~/.local/bin/theme-set --bg-next

# Emoji picker
bind = $mainMod CTRL, E, exec, ~/.local/bin/launch-walker -m symbols

# Zen browser
bind = $mainMod, Z, exec, ~/.local/bin/launch-or-focus zen "uwsm-app -- zen-browser"
bind = $mainMod SHIFT, G, exec, ~/.local/bin/launch-or-focus signal "uwsm-app -- signal-desktop"

# Toggle xwayland video bridge (for screen sharing in X11 apps)
bind = $mainMod SHIFT, X, exec, sh -c 'if pidof xwaylandvideobridge >/dev/null; then killall xwaylandvideobridge && notify-send "xwaylandvideobridge stopped"; else xwaylandvideobridge & notify-send "xwaylandvideobridge started"; fi'

# Bitwarden vault picker
bind = $mainMod, P, exec, ~/.local/bin/launch-walker -m bitwarden --theme bitwarden --width 800
