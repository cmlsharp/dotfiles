force_keyboard_focus = true
selection_wrap = true
theme = "omarchy"
hide_action_hints = false

[placeholders]
"default" = { input = " Search...", list = "No Results" }

[columns]
symbols = 1

[providers]
max_results = 256
default = [
    "desktopapplications",
    "websearch",
]

[[providers.prefixes]]
prefix = "/"
provider = "providerlist"

[[providers.prefixes]]
prefix = "."
provider = "files"

[[providers.prefixes]]
prefix = ":"
provider = "symbols"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = "$"
provider = "clipboard"

[providers.actions]
bitwarden = [
    { action = "copypassword", label = "Copy Password", bind = "Return", default = true },
    { action = "copyusername", label = "Copy Username", bind = "ctrl u" },
    { action = "copytotp", label = "Copy TOTP", bind = "ctrl t" },
    { action = "typepassword", label = "Type Password", bind = "ctrl Return" },
    { action = "typeusername", label = "Type Username", bind = "ctrl shift u" },
    { action = "syncvault", label = "Sync Vault", bind = "ctrl s", global = true },
]
