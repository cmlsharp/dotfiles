source = $HOME/.config/theme/current/hyprlock.conf

$font = JetBrainsMono Nerd Font

# GENERAL
general {
    hide_cursor = true
    immediate_render = true
    ignore_empty_input = true
}

# BACKGROUND
background {
    monitor =
    path = ~/.config/theme/current-background
    blur_passes = 3
    color = $base
}

# TIME
label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%I:%M %p")"
    color = $text
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $text
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

# USER AVATAR

image {
    monitor =
    path = ~/.face
    size = 100
    border_color = $accent

    position = 0, 75
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $surface0
    outer_color = $accent
    outline_thickness = 4

    font_family = $font
    font_color = $text

    placeholder_text = Enter Password
    check_color = $red
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}
