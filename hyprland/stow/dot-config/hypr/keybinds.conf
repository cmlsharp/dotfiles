$terminal = kitty

# ── Basics ───────────────────────────────────────────────────────

bindd = SUPER, return, Terminal, exec, uwsm-app -- kitty
bindd = SUPER, BackSpace, Close window, killactive,
bindd = SUPER SHIFT, BackSpace, Close all windows, exec, ~/.config/hypr/scripts/close-all.sh
bindd = SUPER, space, Launch apps, exec, ~/.config/hypr/scripts/launch-walker --width 600 --height 600
bindd = SUPER SHIFT, C, Reload Hyprland + Waybar, exec, sh -c 'hyprctl reload; killall waybar; uwsm-app -- waybar &'
bindd = CTRL ALT, Delete, System menu, exec, ~/.config/menu/menu --go system
bindd = SUPER SHIFT, E, System menu, exec, ~/.config/menu/menu --go system
bindd = SUPER, Escape, Lock screen, exec, hyprlock
bindd = SUPER CTRL SHIFT, K, Show keybindings, exec, ~/.config/hypr/scripts/show-keybinds
bindd = SUPER, M, Menu, exec, ~/.config/menu/menu

# Alt-Tab window switcher
bindd = ALT, Tab, Next window, exec, snappy-switcher next
bindd = ALT SHIFT, Tab, Previous window, exec, snappy-switcher prev
bindd = SUPER CTRL, S, Cycle display scaling, exec, ~/.config/hypr/scripts/cycle-scale.sh

# Toggle floating btop system monitor
bindd = SUPER, I, System monitor, exec, ~/.config/hypr/scripts/toggle-launch.sh btop --class floating-tui-large

# Move/resize windows with SUPER + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER CTRL, mouse:272, resizewindow

# ── Focus ────────────────────────────────────────────────────────

# Vim keys
bindd = SUPER, h, Focus left, movefocus, l
bindd = SUPER, j, Focus down, movefocus, d
bindd = SUPER, k, Focus up, movefocus, u
bindd = SUPER, l, Focus right, movefocus, r

# Move the focused window (vim keys)
bindd = SUPER SHIFT, h, Move window left, movewindow, l
bindd = SUPER SHIFT, j, Move window down, movewindow, d
bindd = SUPER SHIFT, k, Move window up, movewindow, u
bindd = SUPER SHIFT, l, Move window right, movewindow, r

# Toggle focus between tiling and floating
bindd = SUPER, semicolon, Raise window, alterzorder, top

# ── Workspaces ───────────────────────────────────────────────────

# Switch to workspace
bindd = SUPER, 1, Switch to workspace 1, workspace, 1
bindd = SUPER, 2, Switch to workspace 2, workspace, 2
bindd = SUPER, 3, Switch to workspace 3, workspace, 3
bindd = SUPER, 4, Switch to workspace 4, workspace, 4
bindd = SUPER, 5, Switch to workspace 5, workspace, 5
bindd = SUPER, 6, Switch to workspace 6, workspace, 6
bindd = SUPER, 7, Switch to workspace 7, workspace, 7
bindd = SUPER, 8, Switch to workspace 8, workspace, 8
bindd = SUPER, 9, Switch to workspace 9, workspace, 9
bindd = SUPER, 0, Switch to workspace 10, workspace, 10

# Move window to workspace and follow
bindd = SUPER SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Move window to workspace without following
bindd = SUPER CTRL, 1, Send window to workspace 1, movetoworkspacesilent, 1
bindd = SUPER CTRL, 2, Send window to workspace 2, movetoworkspacesilent, 2
bindd = SUPER CTRL, 3, Send window to workspace 3, movetoworkspacesilent, 3
bindd = SUPER CTRL, 4, Send window to workspace 4, movetoworkspacesilent, 4
bindd = SUPER CTRL, 5, Send window to workspace 5, movetoworkspacesilent, 5
bindd = SUPER CTRL, 6, Send window to workspace 6, movetoworkspacesilent, 6
bindd = SUPER CTRL, 7, Send window to workspace 7, movetoworkspacesilent, 7
bindd = SUPER CTRL, 8, Send window to workspace 8, movetoworkspacesilent, 8
bindd = SUPER CTRL, 9, Send window to workspace 9, movetoworkspacesilent, 9
bindd = SUPER CTRL, 0, Send window to workspace 10, movetoworkspacesilent, 10

# Toggle back to previous workspace
bindd = SUPER, grave, Previous workspace, workspace, previous

# Cycle workspaces
bindd = SUPER, bracketleft, Previous workspace, workspace, m-1
bindd = SUPER, bracketright, Next workspace, workspace, m+1
bindd = SUPER SHIFT, bracketleft, Move window to previous workspace, movetoworkspace, m-1
bindd = SUPER SHIFT, bracketright, Move window to next workspace, movetoworkspace, m+1
bindd = SUPER CTRL, bracketleft, Move window to previous workspace, movetoworkspacesilent, m-1
bindd = SUPER CTRL, bracketright, Move window to next workspace, movetoworkspacesilent, m+1

# Scroll through workspaces
bindd = SUPER, mouse_down, Scroll workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll workspace back, workspace, e-1

# ── Multi-monitor ────────────────────────────────────────────────

bindd = SUPER, comma, Focus previous monitor, focusmonitor, -1
bindd = SUPER, period, Focus next monitor, focusmonitor, +1
bindd = SUPER SHIFT, comma, Move window to previous monitor, movewindow, mon:-1
bindd = SUPER SHIFT, period, Move window to next monitor, movewindow, mon:+1
bindd = SUPER CTRL, comma, Move workspace to previous monitor, movecurrentworkspacetomonitor, -1
bindd = SUPER CTRL, period, Move workspace to next monitor, movecurrentworkspacetomonitor, +1

# ── Clamshell mode ──────────────────────────────────────────────

# Lid close: clamshell mode only (lock+suspend handled by logind+hypridle)
bindl = , switch:on:Lid Switch, exec, [ $(hyprctl monitors -j | grep -c '"name"') -gt 1 ] && hyprctl keyword monitor "eDP-1, disable"
# Lid open: re-enable laptop screen only if it was disabled (clamshell mode)
bindl = , switch:off:Lid Switch, exec, hyprctl monitors -j | grep -q '"name": "eDP-1"' || hyprctl keyword monitor "eDP-1, preferred, auto, 1.6"

# ── Layout ───────────────────────────────────────────────────────

bindd = SUPER, F, Fullscreen, fullscreen, 0
bindd = SUPER SHIFT, F, Fullscreen (keep bar), fullscreen, 1
bindd = SUPER SHIFT, space, Toggle floating, togglefloating,
bindd = SUPER, T, Pop window, exec, ~/.config/hypr/scripts/window-pop.sh
bindd = SUPER SHIFT, M, Swap with master, layoutmsg, swapwithmaster
bindd = SUPER, O, Cycle orientation, layoutmsg, orientationcycle left top
bindd = SUPER SHIFT, P, Toggle pseudo-tile, pseudo,
bindd = SUPER CTRL, M, Toggle master/scrolling layout, exec, ~/.config/hypr/scripts/toggle-layout.sh

# ── Groups ───────────────────────────────────────────────────────

# Toggle groups
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

# Join groups
bindd = SUPER ALT, h, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, l, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, k, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, j, Move window to group on bottom, moveintogroup, d

# Navigate a single set of grouped windows
bindd = SUPER CTRL, TAB, Next window in group, changegroupactive, f
bindd = SUPER CTRL SHIFT, TAB, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
bindd = SUPER CTRL, h, Move grouped window focus left, changegroupactive, b
bindd = SUPER CTRL, l, Move grouped window focus right, changegroupactive, f

# ── Resize submap ────────────────────────────────────────────────

bindd = SUPER, R, Enter resize mode, submap, resize

submap = resize
binde = , h, resizeactive, -10 0
binde = , j, resizeactive, 0 10
binde = , k, resizeactive, 0 -10
binde = , l, resizeactive, 10 0
binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0
binde = SHIFT, h, resizeactive, -50 0
binde = SHIFT, j, resizeactive, 0 50
binde = SHIFT, k, resizeactive, 0 -50
binde = SHIFT, l, resizeactive, 50 0
binde = CTRL, h, moveactive, -20 0
binde = CTRL, j, moveactive, 0 20
binde = CTRL, k, moveactive, 0 -20
binde = CTRL, l, moveactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Media / Volume / Brightness ──────────────────────────────────

$osd = swayosd-client --monitor $(hyprctl monitors -j | jq -r '.[]|select(.focused==true).name')

bindld = SUPER, XF86AudioMute, Switch audio output, exec, ~/.local/bin/audio-switch
bindld = , XF86AudioMute, Toggle mute, exec, $osd --output-volume mute-toggle
bindld = , XF86AudioLowerVolume, Volume down, exec, $osd --output-volume lower
bindld = , XF86AudioRaiseVolume, Volume up, exec, $osd --output-volume raise
bindld = , XF86AudioMicMute, Toggle mic mute, exec, $osd --input-volume mute-toggle

bindld = , XF86MonBrightnessDown, Brightness down, exec, $osd --brightness lower
bindld = , XF86MonBrightnessUp, Brightness up, exec, $osd --brightness raise

bindld = , XF86AudioPlay, Play/pause, exec, $osd --playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, $osd --playerctl pause
bindld = , XF86AudioNext, Next track, exec, $osd --playerctl next
bindld = , XF86AudioPrev, Previous track, exec, $osd --playerctl previous
bindld = , XF86AudioStop, Stop playback, exec, $osd --playerctl stop

# ── Screenshots ───────────────────────────────────────────────────

bindd = , Print, Screenshot, exec, ~/.local/bin/screenshot
bindd = SUPER SHIFT, R, Screen record, exec, ~/.config/hypr/scripts/screenrecord.sh

# ── Utilities ────────────────────────────────────────────────────

bindd = SUPER SHIFT, V, Clipboard history, exec, ~/.config/hypr/scripts/launch-walker -m clipboard --width 1100 --height 600

bindd = SUPER, N, Notification center, exec, swaync-client -t
bindd = SUPER SHIFT, N, Clear notifications, exec, swaync-client -C
bindd = SUPER CTRL, N, Close latest notification, exec, swaync-client --close-latest
bindd = SUPER CTRL, T, Toggle nightlight, exec, ~/.local/bin/toggle-nightlight
bindd = SUPER CTRL, P, Power profile, exec, ~/.config/hypr/scripts/power-profile-cycle

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 0.5')
bindd = SUPER SHIFT, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float - 0.5')
bindd = SUPER CTRL SHIFT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

bindd = SUPER, W, Wifi controls, exec, ~/.config/hypr/scripts/toggle-launch.sh wlctl
bindd = SUPER, V, Audio controls, exec, ~/.config/hypr/scripts/toggle-launch.sh wiremix
bindd = SUPER, B, Bluetooth controls, exec, ~/.config/hypr/scripts/toggle-launch.sh bluetui
bindd = SUPER, E, File manager, exec, uwsm-app -- kitty -e yazi

# Theme picker / background cycle
bindd = SUPER SHIFT, T, Theme picker, exec, ~/.config/menu/menu --no-repeat --go style.theme
bindd = SUPER SHIFT, B, Next background, exec, ~/.local/bin/theme-set --bg-next

# Emoji picker
bindd = SUPER CTRL, E, Emoji picker, exec, ~/.config/hypr/scripts/launch-walker -m symbols --width 600 --height 600

# Zen browser
bindd = SUPER, Z, Zen browser, exec, ~/.config/hypr/scripts/launch-or-focus zen "uwsm-app -- zen-browser"
bindd = SUPER CTRL, S, Signal, exec, ~/.config/hypr/scripts/launch-or-focus signal "uwsm-app -- signal-desktop"
bindd = SUPER, S, Slack, exec, ~/.config/hypr/scripts/launch-or-focus slack "uwsm-app -- slack"
bindd = SUPER, D, Docker (lazydocker), exec, kitty --class floating-tui-large -e lazydocker

# Toggle xwayland video bridge (for screen sharing in X11 apps)
bindd = SUPER SHIFT, X, Toggle XWayland video bridge, exec, sh -c 'if pidof xwaylandvideobridge >/dev/null; then killall xwaylandvideobridge && notify-send "xwaylandvideobridge stopped"; else xwaylandvideobridge & notify-send "xwaylandvideobridge started"; fi'

# Bitwarden vault picker
bindd = SUPER, P, Bitwarden vault, exec, ~/.config/hypr/scripts/launch-walker -m bitwarden --theme bitwarden --width 800 --height 600
