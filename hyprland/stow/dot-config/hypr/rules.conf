# ── Window rules ─────────────────────────────────────────────────

windowrule = suppress_event maximize, match:class .*
windowrule = idle_inhibit always, match:fullscreen 1
windowrule = idle_inhibit fullscreen, match:class (steam.*|com.libretro.RetroArch)

# pop
windowrule = rounding 8, match:tag pop

# Password managers: hide from screen share
windowrule = no_screen_share on, match:class ^(1[pP]assword|Bitwarden)$

# Signal
windowrule = focus_on_activate off, match:class signal
windowrule = focus_on_activate off, match:class Slack

# nwg-displays
windowrule = tag +floating-window-large, match:class nwg-displays

windowrule {
    name = floating-window
    match:tag = floating-window
    float = on
    center = on
}

# Floating windows
windowrule = tag +floating-window-small, match:class (org.gnome.NautilusPreviewer|com.gabm.satty|TUI.float|imv|mpv|floating-tui)
windowrule = tag +floating-window-small, match:class (xdg-desktop-portal-gtk|xdg-desktop-portal-hyprland|org.gnome.Nautilus|thunar), match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)
windowrule = tag +floating-window-large, match:class floating-tui-large
windowrule = float on, match:class org.gnome.Calculator

windowrule {
    name = floating-window-small
    match:tag = floating-window-small
    size =  875 600
    tag = +floating-window
}

windowrule {
    name = floating-window-large
    match:tag = floating-window-large
    size =  1200 800
    tag = +floating-window
}

# Popped window rounding
windowrule = rounding 8, match:tag pop

# Prevent idle while open
windowrule = idle_inhibit always, match:tag noidle

# ── PiP ─────────────────────────────────────────────────────────

windowrule {
    name = pip
    match:title = ^Picture.in.[Pp]icture$
    tag = +floating-window
    size = 480 270
    move = 100%-490 100%-280
    keep_aspect_ratio = on
    border_size = 0
}


# ── Steam ────────────────────────────────────────────────────────

windowrule = float on, match:class steam
windowrule = center on, match:class steam, match:title Steam
windowrule = size 1100 700, match:class steam, match:title Steam
windowrule = size 460 800, match:class steam, match:title Friends List


# Webcam overlay
windowrule {
    name = webcam overlay
    match:title = WebcamOverlay
    float = on
    pin = on
    no_initial_focus = on
    no_dim = on
    move = 100%-40 100%-40
}

# Float LocalSend and fzf file picker
windowrule = tag +floating-window, match:class (Share|localsend)
windowrule = size 1100 700, match:class localsend

#windowrule = float on, match:title ^(Open|Save|File|Folder|Browse)
#windowrule = center on, match:title ^(Open|Save|File|Folder|Browse)
#windowrule = size 900 600, match:title ^(Open|Save|File|Folder|Browse)

# ── Layer rules ──────────────────────────────────────────────────

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi

layerrule = no_anim on, match:namespace walker
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.3, match:namespace walker

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.3, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window

layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0.3, match:namespace logout_dialog

layerrule = no_anim on, match:namespace selection

# XWayland
xwayland {
    force_zero_scaling = true
}

# xwayland bridge fixes
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
    workspace = special:hidden silent
}


# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
