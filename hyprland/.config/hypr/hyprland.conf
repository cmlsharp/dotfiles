
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################
#
#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#
source=~/.config/hypr/mocha.conf

exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 28
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = wl-paste --watch cliphist store
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = rbw unlock
exec-once = snappy-switcher --daemon &

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor=eDP-1,preferred,auto,1.6

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
# Set programs that you use
$terminal = kitty
$menu = ~/.config/rofi/launch-drun.sh


xwayland {
    force_zero_scaling = true
}

windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
    workspace = special:hidden silent
}

# Some default env vars.
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =

    repeat_delay = 300
    repeat_rate = 40

    follow_mouse = 1
    natural_scroll = true

    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        tap-to-click = false
    }

    emulate_discrete_scroll = false

    sensitivity = 0
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    border_size = 3

    col.active_border = $mauve
    col.inactive_border = $subtext0

    resize_on_border = true

    gaps_in = 4
    gaps_out = 8

    layout = master

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5

    blur {
        enabled = true
        size = 6
        passes = 3
        xray = false
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    dim_inactive = true
    dim_strength = 0.20
}

animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

master {
    new_status = slave
    orientation = left
    mfact = 0.55
}

group {
    col.border_active = $mauve
    col.border_inactive = $surface1

    groupbar {
        font_family = monospace
        font_size = 14
        height = 26
        text_color = $text
        col.active = $mauve
        col.inactive = $surface0
    }
}

# Gestures
#gesture = 3, horizontal, workspace

misc {
    force_default_wallpaper = 0
    allow_session_lock_restore = true
}

binds {
    workspace_back_and_forth = true
}

cursor {
    inactive_timeout = 3
    warp_on_change_workspace = true
}


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Window rules
windowrule = suppress_event maximize, match:class .*
windowrule = idle_inhibit always, match:fullscreen 1

windowrule = float on, match:class wdisplays
windowrule = size 800 600, match:class wdisplays
windowrule = center on, match:class wdisplays


windowrule  {
    name = floating-tui
    match:class = floating-tui
    float = on
    center = on
    size = 875 600
}

windowrule  {
    name = floating-tui-large
    match:class = floating-tui-large
    float = on
    center = on
    size = 1200 700
}

# Layer rules
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.3, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window


$mainMod = super

# ── Basics ───────────────────────────────────────────────────────

bind = $mainMod, return, exec, $terminal
bind = $mainMod, BackSpace, killactive,
bind = $mainMod, C, killactive,
bind = $mainMod, space, exec, $menu
bind = $mainMod SHIFT, C, exec, sh -c 'hyprctl reload; killall waybar; waybar &'
bind = $mainMod SHIFT, E, exec, wlogout
bind = CTRL ALT, Delete, exec, wlogout
bind = $mainMod, Escape, exec, hyprlock

# Alt-Tab window switcher
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev
bind = $mainMod, E, togglesplit,
bind = $mainMod SHIFT, D, exec, wdisplays

# Toggle floating btop system monitor
bind = $mainMod, I, exec, ~/.config/hypr/scripts/toggle-launch.sh btop --class floating-tui-large

# Toggle animations
bind = $mainMod SHIFT, A, exec, ~/.config/hypr/scripts/toggle-animations.sh

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Focus ────────────────────────────────────────────────────────

# Vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r
# Arrow keys
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

# Move the focused window (vim keys)
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r
# Move the focused window (arrow keys)
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Down, movewindow, d
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

# Toggle focus between tiling and floating
bind = $mainMod, semicolon, alterzorder, top

# ── Workspaces ───────────────────────────────────────────────────

# Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace and follow
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace without following
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Toggle back to previous workspace
bind = $mainMod, grave, workspace, previous

# Cycle workspaces
bind = $mainMod, bracketleft, workspace, m-1
bind = $mainMod, bracketright, workspace, m+1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, m-1
bind = $mainMod SHIFT, bracketright, movetoworkspace, m+1

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Multi-monitor ────────────────────────────────────────────────

bind = $mainMod, comma, focusmonitor, -1
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod SHIFT, comma, movewindow, mon:-1
bind = $mainMod SHIFT, period, movewindow, mon:+1
bind = $mainMod CTRL, comma, movecurrentworkspacetomonitor, -1
bind = $mainMod CTRL, period, movecurrentworkspacetomonitor, +1

# ── Clamshell mode ──────────────────────────────────────────────

# Lid close: lock+suspend if no external monitor, clamshell mode if external monitor
# Lid close: clamshell mode only (lock+suspend handled by logind+hypridle)
bindl = , switch:on:Lid Switch, exec, [ $(hyprctl monitors -j | grep -c '"name"') -gt 1 ] && hyprctl keyword monitor "eDP-1, disable"
# Lid open: re-enable laptop screen only if it was disabled (clamshell mode)
bindl = , switch:off:Lid Switch, exec, hyprctl monitors -j | grep -q '"name": "eDP-1"' || hyprctl keyword monitor "eDP-1, preferred, auto, 1.6"

# ── Layout ───────────────────────────────────────────────────────

bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod SHIFT, space, togglefloating,
bind = $mainMod, T, pin,

# ── Groups ───────────────────────────────────────────────────────

bind = $mainMod, G, togglegroup,
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, Tab, changegroupactive, b
bind = $mainMod CTRL, h, movewindoworgroup, l
bind = $mainMod CTRL, j, movewindoworgroup, d
bind = $mainMod CTRL, k, movewindoworgroup, u
bind = $mainMod CTRL, l, movewindoworgroup, r

# ── Scratchpad ───────────────────────────────────────────────────

bind = $mainMod SHIFT, minus, movetoworkspace, special:magic
bind = $mainMod, minus, togglespecialworkspace, magic

# ── Resize submap ────────────────────────────────────────────────

bind = $mainMod, R, submap, resize

submap = resize
binde = , h, resizeactive, -10 0
binde = , j, resizeactive, 0 10
binde = , k, resizeactive, 0 -10
binde = , l, resizeactive, 10 0
binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0
binde = SHIFT, h, resizeactive, -50 0
binde = SHIFT, j, resizeactive, 0 50
binde = SHIFT, k, resizeactive, 0 -50
binde = SHIFT, l, resizeactive, 50 0
binde = CTRL, h, moveactive, -20 0
binde = CTRL, j, moveactive, 0 20
binde = CTRL, k, moveactive, 0 -20
binde = CTRL, l, moveactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Media / Volume / Brightness ──────────────────────────────────

bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioRaiseVolume, exec, bash -c 'pactl set-sink-volume @DEFAULT_SINK@ +5% && [ "$(pactl get-sink-volume @DEFAULT_SINK@ | grep -oP "[0-9]+%" | head -1 | tr -d %)" -gt 100 ] && pactl set-sink-volume @DEFAULT_SINK@ 100%'
bindl = , XF86AudioMicMute, exec, sh -c 'pactl set-source-mute @DEFAULT_SOURCE@ toggle; pkill -RTMIN+10 waybar'

bindl = , XF86MonBrightnessDown, exec, sh -c 'brightnessctl set 5%-; [ $(brightnessctl get) -lt $(($(brightnessctl max) / 10)) ] && brightnessctl set 10%'
bindl = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# ── Screenshots ───────────────────────────────────────────────────

bind = , Print, exec, hyprshot -m output
BIND = $MAinMod, Print, exec, hyprshot -m window
bind = $mainMod SHIFT, Print, exec, hyprshot -m region
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/screenrecord.sh

# ── Utilities ────────────────────────────────────────────────────

# Clipboard history
bind = $mainMod SHIFT, V, exec, sh -c 'cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy'

# Notification center
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, swaync-client -C
bind = $mainMod CTRL, N, exec, swaync-client --close-latest

bind = $mainMod, W, exec, ~/.config/hypr/scripts/toggle-launch.sh wlctl
bind = $mainMod, V, exec, ~/.config/hypr/scripts/toggle-launch.sh wiremix
bind = $mainMod, B, exec, ~/.config/hypr/scripts/toggle-launch.sh bluetui
bind = $mainMod, E, exec, kitty -e yazi

# Zen browser
bind = $mainMod SHIFT, B, exec, zen-browser

# Toggle xwayland video bridge (for screen sharing in X11 apps)
bind = $mainMod SHIFT, X, exec, sh -c 'if pidof xwaylandvideobridge >/dev/null; then killall xwaylandvideobridge && notify-send "xwaylandvideobridge stopped"; else xwaylandvideobridge & notify-send "xwaylandvideobridge started"; fi'

# Bitwarden vault picker
bind = $mainMod, P, exec, rofi-rbw --prompt "Bitwarden" --clear-after 30 --keybindings "Alt+1:type:password,Alt+2:copy:password,Alt+3:type:username,Alt+4:copy:username" --selector-args='-mesg "&lt;A-1&gt;/Enter type pw | &lt;A-2&gt; copy pw | &lt;A-3&gt; type user | &lt;A-4&gt; copy user"'
