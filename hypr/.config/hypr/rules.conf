# Window Rules
# https://wiki.hypr.land/Configuring/Window-Rules/

# ── Float & Center ───────────────────────────────────────────────

windowrule {
    name = float-wdisplays
    match:class = ^(wdisplays)$
    float = on
    size = 800 600
    center = on
}

windowrule {
    name = float-btop
    match:title = ^(floating-btop)$
    float = on
    size = 1200 700
    center = on
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$
    float = on
    size = 800 500
    center = on
}

windowrule {
    name = float-nm
    match:class = ^(nm-connection-editor|blueman-manager)$
    float = on
    center = on
}

windowrule {
    name = float-calc
    match:class = ^(org.gnome.Calculator|qalculate-gtk)$
    float = on
    center = on
}

# File dialogs
windowrule {
    name = float-save-as
    match:title = ^(Save As|Open File|Open Files)$
    float = on
    size = 900 600
    center = on
}

# Auth dialogs
windowrule {
    name = float-auth
    match:title = ^(Authentication Required)$
    float = on
    center = on
}

# Picture-in-Picture
windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    keep_aspect_ratio = on
    size = 480 270
    move = 72% 7%
    opacity = 0.95 0.8
}


# ── Opacity ──────────────────────────────────────────────────────

windowrule = match:class ^(kitty|foot)$, opacity 0.92 0.85
windowrule = match:class ^(thunar|org.gnome.Nautilus)$, opacity 0.92 0.85
windowrule = match:class ^(codium|VSCodium|code|VSCode)$, opacity 0.95 0.88
windowrule = match:class ^(discord|vesktop|WebCord)$, opacity 0.94 0.88


# ── Idle Inhibit ─────────────────────────────────────────────────

windowrule = idle_inhibit fullscreen, match:fullscreen 1


# ── Suppress Maximize ────────────────────────────────────────────

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}


# ── XWayland Fix ─────────────────────────────────────────────────

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}


# ── Layer Rules ──────────────────────────────────────────────────

layerrule = match:namespace fuzzel, blur on, ignore_alpha 0.3
layerrule = match:namespace notifications, blur on, ignore_alpha 0.3
layerrule = match:namespace waybar, blur on, ignore_alpha 0.3
layerrule = match:namespace swaync-control-center, blur on, ignore_alpha 0.3
layerrule = match:namespace swaync-notification-window, blur on, ignore_alpha 0.3
