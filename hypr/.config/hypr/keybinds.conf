# Keybindings
# https://wiki.hypr.land/Configuring/Binds/

$mainMod = SUPER


# ── Basics ───────────────────────────────────────────────────────

bindd = $mainMod, Return, Open terminal, exec, $terminal
bindd = $mainMod, D, App launcher, exec, $menu
bindd = $mainMod, BackSpace, Close window, killactive,
bindd = $mainMod, C, Close window, killactive,
bindd = $mainMod SHIFT, C, Reload config, exec, hyprctl reload
bindd = $mainMod SHIFT, E, Session menu, exec, wlogout
bindd = CTRL ALT, Delete, Session menu, exec, wlogout
bindd = $mainMod SHIFT, B, Open browser, exec, $browser

# Toggle floating btop
bindd = $mainMod, I, System monitor, exec, kitty --title floating-btop btop

# Mic mute toggle
bindd = $mainMod, M, Toggle mic mute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle


# ── Focus ────────────────────────────────────────────────────────

bindd = $mainMod, H, Focus left, movefocus, l
bindd = $mainMod, J, Focus down, movefocus, d
bindd = $mainMod, K, Focus up, movefocus, u
bindd = $mainMod, L, Focus right, movefocus, r
bindd = $mainMod, Left, Focus left, movefocus, l
bindd = $mainMod, Down, Focus down, movefocus, d
bindd = $mainMod, Up, Focus up, movefocus, u
bindd = $mainMod, Right, Focus right, movefocus, r

# Cycle windows (alt-tab style)
bindd = ALT, Tab, Cycle next window, cyclenext,
bindd = ALT SHIFT, Tab, Cycle prev window, cyclenext, prev


# ── Move Windows ─────────────────────────────────────────────────

bindd = $mainMod SHIFT, H, Move window left, movewindow, l
bindd = $mainMod SHIFT, J, Move window down, movewindow, d
bindd = $mainMod SHIFT, K, Move window up, movewindow, u
bindd = $mainMod SHIFT, L, Move window right, movewindow, r
bindd = $mainMod SHIFT, Left, Move window left, movewindow, l
bindd = $mainMod SHIFT, Down, Move window down, movewindow, d
bindd = $mainMod SHIFT, Up, Move window up, movewindow, u
bindd = $mainMod SHIFT, Right, Move window right, movewindow, r

# Swap windows
bindd = $mainMod ALT, H, Swap window left, swapwindow, l
bindd = $mainMod ALT, J, Swap window down, swapwindow, d
bindd = $mainMod ALT, K, Swap window up, swapwindow, u
bindd = $mainMod ALT, L, Swap window right, swapwindow, r


# ── Workspaces ───────────────────────────────────────────────────

bindd = $mainMod, 1, Workspace 1, workspace, 1
bindd = $mainMod, 2, Workspace 2, workspace, 2
bindd = $mainMod, 3, Workspace 3, workspace, 3
bindd = $mainMod, 4, Workspace 4, workspace, 4
bindd = $mainMod, 5, Workspace 5, workspace, 5
bindd = $mainMod, 6, Workspace 6, workspace, 6
bindd = $mainMod, 7, Workspace 7, workspace, 7
bindd = $mainMod, 8, Workspace 8, workspace, 8
bindd = $mainMod, 9, Workspace 9, workspace, 9
bindd = $mainMod, 0, Workspace 10, workspace, 10

# Move to workspace and follow
bindd = $mainMod SHIFT, 1, Move to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move to workspace 10, movetoworkspace, 10

# Move to workspace silently (don't follow)
bindd = $mainMod CTRL, 1, Send to workspace 1, movetoworkspacesilent, 1
bindd = $mainMod CTRL, 2, Send to workspace 2, movetoworkspacesilent, 2
bindd = $mainMod CTRL, 3, Send to workspace 3, movetoworkspacesilent, 3
bindd = $mainMod CTRL, 4, Send to workspace 4, movetoworkspacesilent, 4
bindd = $mainMod CTRL, 5, Send to workspace 5, movetoworkspacesilent, 5
bindd = $mainMod CTRL, 6, Send to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod CTRL, 7, Send to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod CTRL, 8, Send to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod CTRL, 9, Send to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod CTRL, 0, Send to workspace 10, movetoworkspacesilent, 10

# Workspace navigation
bindd = $mainMod, Grave, Previous workspace, workspace, previous
bindd = $mainMod, BracketLeft, Prev workspace, workspace, e-1
bindd = $mainMod, BracketRight, Next workspace, workspace, e+1
bindd = $mainMod SHIFT, BracketLeft, Move to prev workspace, movetoworkspace, -1
bindd = $mainMod SHIFT, BracketRight, Move to next workspace, movetoworkspace, +1

# Scroll through workspaces
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Prev workspace, workspace, e-1


# ── Multi-monitor ────────────────────────────────────────────────

bindd = $mainMod, Comma, Focus prev monitor, focusmonitor, -1
bindd = $mainMod, Period, Focus next monitor, focusmonitor, +1
bindd = $mainMod SHIFT, Comma, Move to prev monitor, movewindow, mon:-1
bindd = $mainMod SHIFT, Period, Move to next monitor, movewindow, mon:+1
bindd = $mainMod CTRL, Comma, Move workspace to prev monitor, movecurrentworkspacetomonitor, -1
bindd = $mainMod CTRL, Period, Move workspace to next monitor, movecurrentworkspacetomonitor, +1


# ── Layout ───────────────────────────────────────────────────────

bindd = $mainMod, V, Toggle split (dwindle), togglesplit,
bindd = $mainMod, P, Toggle pseudo (dwindle), pseudo,
bindd = $mainMod, F, Fullscreen, fullscreen, 0
bindd = $mainMod SHIFT, F, Maximize (keep bar), fullscreen, 1
bindd = $mainMod, T, Toggle sticky, exec, hyprctl dispatch pin active
bindd = $mainMod SHIFT, Space, Toggle floating, togglefloating,
bindd = $mainMod, Space, Focus mode toggle, exec, hyprctl dispatch focuswindow floating

# Toggle gaps
bindd = $mainMod, G, Toggle gaps, exec, hyprctl keyword general:gaps_in $(($(hyprctl getoption general:gaps_in -j | python3 -c "import sys,json; v=json.load(sys.stdin)['int']; print(0 if v else 4)"))) && hyprctl keyword general:gaps_out $(($(hyprctl getoption general:gaps_out -j | python3 -c "import sys,json; v=json.load(sys.stdin)['int']; print(0 if v else 8)")))


# ── Groups ───────────────────────────────────────────────────────

bindd = $mainMod, W, Toggle group, togglegroup,
bindd = $mainMod, Tab, Next in group, changegroupactive, f
bindd = $mainMod SHIFT, Tab, Prev in group, changegroupactive, b


# ── Special Workspace (Scratchpad) ───────────────────────────────

bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = $mainMod SHIFT, S, Move to scratchpad, movetoworkspace, special:scratchpad


# ── Resize / Move (submap) ───────────────────────────────────────

bindd = $mainMod, R, Enter resize mode, submap, resize

submap = resize
    binded = , H, Shrink width, resizeactive, -30 0
    binded = , J, Grow height, resizeactive, 0 30
    binded = , K, Shrink height, resizeactive, 0 -30
    binded = , L, Grow width, resizeactive, 30 0
    binded = , Left, Shrink width, resizeactive, -30 0
    binded = , Down, Grow height, resizeactive, 0 30
    binded = , Up, Shrink height, resizeactive, 0 -30
    binded = , Right, Grow width, resizeactive, 30 0

    # Coarse resize
    binded = SHIFT, H, Shrink width (coarse), resizeactive, -80 0
    binded = SHIFT, J, Grow height (coarse), resizeactive, 0 80
    binded = SHIFT, K, Shrink height (coarse), resizeactive, 0 -80
    binded = SHIFT, L, Grow width (coarse), resizeactive, 80 0

    # Move floating window
    binded = CTRL, H, Move left, moveactive, -30 0
    binded = CTRL, J, Move down, moveactive, 0 30
    binded = CTRL, K, Move up, moveactive, 0 -30
    binded = CTRL, L, Move right, moveactive, 30 0

    bindd = , Escape, Exit resize, submap, reset
    bindd = , Return, Exit resize, submap, reset
submap = reset

# Mouse move/resize
bindmd = $mainMod, mouse:272, Move window, movewindow
bindmd = $mainMod, mouse:273, Resize window, resizewindow


# ── Session ──────────────────────────────────────────────────────

bindd = $mainMod, Escape, Lock screen, exec, hyprlock


# ── Media / Volume / Brightness ──────────────────────────────────

bindeld = , XF86AudioMute, Toggle mute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindeld = , XF86AudioLowerVolume, Volume down, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindeld = , XF86AudioRaiseVolume, Volume up, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindld = , XF86AudioMicMute, Toggle mic, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

bindeld = , XF86MonBrightnessDown, Brightness down, exec, brightnessctl -e4 -n2 set 5%-
bindeld = , XF86MonBrightnessUp, Brightness up, exec, brightnessctl -e4 -n2 set 5%+

bindld = , XF86AudioPlay, Play/pause, exec, playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, playerctl pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Prev track, exec, playerctl previous
bindld = , XF86AudioStop, Stop, exec, playerctl stop


# ── Screenshots ──────────────────────────────────────────────────

# Full screen -> file
bindd = , Print, Screenshot (full), exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot saved"

# Region -> clipboard
bindd = $mainMod SHIFT, S, Screenshot region (clipboard), exec, slurp | grim -g - - | wl-copy && notify-send "Screenshot copied"

# Region -> file
bindd = $mainMod SHIFT, Print, Screenshot region (file), exec, slurp | grim -g - ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot saved"

# Active window -> clipboard
bindd = $mainMod, Print, Screenshot window (clipboard), exec, hyprctl -j activewindow | python3 -c "import sys,json; g=json.load(sys.stdin)['at']; s=json.load(open('/dev/stdin') if False else sys.stdin); print(f\"{g[0]},{g[1]} {s['size'][0]}x{s['size'][1]}\")" 2>/dev/null | grim -g - - | wl-copy && notify-send "Screenshot copied" || grim -g "$(hyprctl -j activewindow | python3 -c 'import sys,json;w=json.load(sys.stdin);print(f\"{w[\"at\"][0]},{w[\"at\"][1]} {w[\"size\"][0]}x{w[\"size\"][1]}\")')" - | wl-copy && notify-send "Screenshot copied"


# ── Utilities ────────────────────────────────────────────────────

# Clipboard history
bindd = $mainMod SHIFT, V, Clipboard history, exec, cliphist list | fuzzel --dmenu --prompt "Clipboard: " | cliphist decode | wl-copy

# Notification panel
bindd = $mainMod, N, Toggle notifications, exec, swaync-client -t -sw

# Bitwarden vault
bindd = $mainMod SHIFT, P, Vault (type), exec, rofi-rbw --prompt "Vault (Type): "
bindd = $mainMod CTRL, P, Vault (copy), exec, rofi-rbw --action copy --prompt "Vault (Copy): "

# Screen recording
bindd = $mainMod SHIFT, R, Toggle recording, exec, ~/.config/waybar/scripts/screen-record.sh

# Display manager
bindd = $mainMod SHIFT, D, Display settings, exec, wdisplays

# Zoom
bindd = $mainMod ALT, mouse_down, Zoom in, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {f=$2; if(f<1)f=1; print f*1.5}')"
bindd = $mainMod ALT, mouse_up, Zoom out, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {f=$2; if(f<1)f=1; print f/1.5}')"
bindd = $mainMod ALT, 0, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Toggle opacity for active window
bindd = $mainMod CTRL, O, Toggle opacity, setprop, active opaque toggle
