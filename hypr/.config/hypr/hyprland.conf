# Hyprland Configuration
# https://wiki.hypr.land/Configuring/

source = ~/.config/hypr/mocha.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/autostart.conf


################
### MONITORS ###
################

monitor = , preferred, auto, auto


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$menu = fuzzel
$browser = zen-browser
$fileManager = thunar


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, catppuccin-mocha-dark-cursors
env = HYPRCURSOR_SIZE, 24
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, qt6ct
env = GDK_BACKEND, wayland,x11,*
env = SDL_VIDEODRIVER, wayland


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 3

    col.active_border = $mauve $blue 45deg
    col.inactive_border = rgba($surface0Alpha80)

    resize_on_border = true
    hover_icon_on_border = true

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.92

    dim_inactive = true
    dim_strength = 0.12

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = true
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 5, wind, slide
    animation = windowsIn, 1, 4, winIn, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = windowsMove, 1, 4, wind, slide
    animation = border, 1, 10, liner
    animation = borderangle, 1, 100, liner, loop
    animation = fade, 1, 3, smoothOut
    animation = workspaces, 1, 4, overshot, slide
    animation = workspacesIn, 1, 4, winIn, slide
    animation = workspacesOut, 1, 4, winOut, slide
    animation = layers, 1, 3, wind, fade
    animation = layersIn, 1, 3, winIn, fade
    animation = layersOut, 1, 2, smoothOut, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.85
}

master {
    new_status = master
    mfact = 0.5
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 1
    mouse_move_enables_dpms = true
    focus_on_activate = false
    middle_click_paste = false
    enable_anr_dialog = true
    anr_missed_pings = 10
    allow_session_lock_restore = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = caps:escape

    repeat_rate = 40
    repeat_delay = 300

    sensitivity = 0
    follow_mouse = 1
    float_switch_override_focus = false

    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        disable_while_typing = true
        tap-to-click = true
    }
}

gestures {
    gesture = 3, horizontal, workspace
    workspace_swipe_distance = 400
    workspace_swipe_invert = true
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_forever = true
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}

xwayland {
    force_zero_scaling = true
}

cursor {
    no_hardware_cursors = 2
    enable_hyprcursor = true
    hide_on_key_press = true
    inactive_timeout = 3
}

group {
    col.border_active = $mauve
    col.border_inactive = $surface0

    groupbar {
        font_family = SauceCodePro Nerd Font
        font_size = 10
        col.active = rgba($mauveAlpha40)
        col.inactive = rgba($surface0Alpha80)
        text_color = $text
        gaps_in = 4
        gaps_out = 4
        rounding = 0
    }
}
