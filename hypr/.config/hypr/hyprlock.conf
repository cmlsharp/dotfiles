# Hyprlock - Lock screen
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

source = ~/.config/hypr/mocha.conf

general {
    hide_cursor = true
    grace = 3
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    color = $base
}

# Time
label {
    monitor =
    text = $TIME12
    color = $text
    font_size = 80
    font_family = SauceCodePro Nerd Font
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 0
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $subtext0
    font_size = 20
    font_family = SauceCodePro Nerd Font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 0
}

# User greeting
label {
    monitor =
    text = Hi, $USER
    color = $lavender
    font_size = 16
    font_family = SauceCodePro Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = 0
    outer_color = $mauve
    inner_color = rgba($baseAlphacc)
    font_color = $text
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <span foreground="##$overlay0Alpha">  Enter Password...</span>
    hide_input = false
    rounding = 0
    check_color = $green
    fail_color = $red
    fail_text = <span foreground="##$redAlpha">  $FAIL ($ATTEMPTS)</span>
    fail_transition = 200
    capslock_color = $yellow
    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 0
}
