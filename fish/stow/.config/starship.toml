# Catppuccin Mocha Starship Prompt

palette = "catppuccin_mocha"

format = """$directory$cmd_duration$character"""

right_format = """$git_branch$git_status$status"""

[directory]
style = "flamingo"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""
"Videos" = ""

[git_branch]
symbol = ""
style = "green"
format = "[$branch ]($style)"

[git_status]
style = "peach"
format = "[$all_status$ahead_behind]($style)"

[cmd_duration]
min_time = 2000
style = "overlay0"
format = "[took $duration ]($style)"

[character]
success_symbol = "[❯](mauve) "
error_symbol = "[❯](red) "
vimcmd_symbol = "[❮](green) "
vimcmd_replace_one_symbol = "[❮](peach) "

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = " "
style = "red"

