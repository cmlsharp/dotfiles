# Font
font_family      SauceCodePro Nerd Font
font_size        11

# Shell
shell            tmux new-session
shell_integration no-sudo

# Window
window_padding_width 4
background_opacity   0.7

# Cursor
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor                #cba6f7
cursor_text_color     #1e1e2e

# URL handling
url_style        single
open_url_with    xdg-open
detect_urls      yes

# Colors (Catppuccin Mocha)
foreground #cdd6f4
background #1e1e2e

# Normal colors
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

# Bright colors
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8
